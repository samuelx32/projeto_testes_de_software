<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="topo">
        <h1>Saúde e Cuidado</h1>
    </div>
    <div class="container">

        <div class="card">

            <h2>Cadastro</h2>

            <input type="text" id="nomeCadastro" placeholder="Nome">
            <input type="email" id="emailCadastro" placeholder="Email">

            <button onclick="cadastrarUsuario()">
                Cadastrar
            </button>

        </div>

        <div class="card">

            <h2>Login</h2>

            <input type="email" id="emailLogin" placeholder="Email">

            <button onclick="login()">
                Entrar
            </button>

        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
